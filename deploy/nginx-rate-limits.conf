# Rate-limit zones for the Wiki Assistant agent (plan B-7).
#
# Include this file inside the http {} block of nginx.conf, e.g.:
#
#   http {
#       include /etc/nginx/conf.d/magi-assistant-rate-limits.conf;
#       ...
#   }
#
# Tiered limits:
#   - Signed-in users (cookie present): 60 chats/user/min, keyed on _hyperon_session.
#   - Anonymous (no cookie):            10 chats/IP/min, keyed on $binary_remote_addr.
#
# The `map` directives below build a "skip" key (empty string) for whichever
# zone shouldn't apply on a given request. nginx skips limit_req when the key
# evaluates to an empty string.

# When the session cookie is non-empty, route through the user zone only.
map $cookie__hyperon_session $magi_assistant_user_key {
    default "";
    "~."    $cookie__hyperon_session;
}

# When the session cookie is empty, route through the IP zone only.
map $cookie__hyperon_session $magi_assistant_ip_key {
    default $binary_remote_addr;
    "~."    "";
}

limit_req_zone $magi_assistant_user_key zone=magi_assistant_user:10m rate=60r/m;
limit_req_zone $magi_assistant_ip_key   zone=magi_assistant_ip:10m   rate=10r/m;
