# Nginx location block for the Wiki Assistant agent sidecar.
#
# Drop this into the server {} block that serves wiki.hyperon.dev, e.g.:
#
#   server {
#       server_name wiki.hyperon.dev;
#       ...
#       include /etc/nginx/snippets/magi-assistant.conf;
#   }
#
# Requires the rate-limit zones from nginx-rate-limits.conf to be loaded in
# the http {} block.

location /api/assistant/ {
    # Tiered rate limit (plan B-7). One zone is skipped per request based on
    # whether _hyperon_session is set — see nginx-rate-limits.conf.
    limit_req zone=magi_assistant_user burst=10 nodelay;
    limit_req zone=magi_assistant_ip   burst=3  nodelay;
    limit_req_status 429;

    proxy_pass http://127.0.0.1:8766/api/assistant/;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Forward the session cookie so the sidecar can detect auth tier.
    proxy_set_header Cookie            $http_cookie;

    # SSE compatibility — must NOT buffer.
    proxy_buffering off;
    proxy_cache     off;
    proxy_set_header Connection "";

    # Streams may run up to AGENT_TIMEOUT_MS=30s; give a small upstream margin.
    proxy_connect_timeout 5s;
    proxy_send_timeout    35s;
    proxy_read_timeout    35s;

    # Conversation history is the largest payload (~16k tokens ≈ 64KB), plus
    # JSON overhead. 256k is generous and matches the Express body limit.
    client_max_body_size 256k;

    # Tag responses for debug — does not leak chat content.
    add_header X-Assistant-Backend "magi-assistant-wiki" always;
}
